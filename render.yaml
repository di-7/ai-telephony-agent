services:
  - type: web
    name: ai-telephony-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: VIDEOSDK_AUTH_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SIP_GATEWAY_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TEAM_EMAIL
        sync: false
      - key: PYTHON_UNBUFFERED
        value: "1"
